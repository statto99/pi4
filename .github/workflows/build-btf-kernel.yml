name: Build RPi4 Kernel with BTF + WiFi

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            repo git curl \
            build-essential \
            clang llvm lld \
            flex bison bc \
            libssl-dev libelf-dev \
            dwarves pahole \
            wget

      # 3. Initialize Android kernel source
      - name: Init kernel repo
        run: |
          mkdir android-kernel
          cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-lts
          mkdir -p .repo/local_manifests
          curl -L https://raw.githubusercontent.com/raspberry-vanilla/android_kernel_manifest/android-16.0/manifest_brcm_rpi.xml \
            -o .repo/local_manifests/rpi.xml
          repo sync -j$(nproc)

      # 4. Download RPi WiFi firmware
      - name: Download RPi WiFi firmware
        run: |
          cd android-kernel
          FIRMWARE_DIR="common/firmware"
          mkdir -p "$FIRMWARE_DIR/brcm"

          BASE="https://raw.githubusercontent.com/RPi-Distro/firmware-nonfree/master/debian/config/brcm80211/brcm"

          for f in \
            "brcmfmac43455-sdio.bin" \
            "brcmfmac43455-sdio.clm_blob" \
            "brcmfmac43455-sdio.txt"; do
            echo "Downloading: $f"
            wget -q -O "$FIRMWARE_DIR/brcm/$f" "$BASE/$f" || echo "Warning: could not download $f"
          done

          echo "=== Firmware files ==="
          ls -la "$FIRMWARE_DIR/brcm/"

      # 5. Patch defconfig for BTF + WiFi
      - name: Patch defconfig for BTF + WiFi
        run: |
          cd android-kernel
          CONFIG=common/arch/arm64/configs/android_rpi4_defconfig

          cp $CONFIG ${CONFIG}.backup

          # Strip any existing assignments for symbols we are about to set,
          # so Kleaf's strict checker sees clean first-assignments only.
          grep -v -E \
            "CONFIG_EXTRA_FIRMWARE|CONFIG_EXTRA_FIRMWARE_DIR|\
CONFIG_DEBUG_INFO[^_]|CONFIG_DEBUG_INFO_DWARF5|CONFIG_DEBUG_INFO_BTF|\
CONFIG_DEBUG_INFO_NONE|CONFIG_DEBUG_INFO_REDUCED|CONFIG_DEBUG_INFO_SPLIT|\
CONFIG_BPF[^_]|CONFIG_BPF_SYSCALL|CONFIG_BPF_JIT|\
CONFIG_CFG80211|CONFIG_MAC80211|\
CONFIG_WEXT_CORE|CONFIG_WEXT_PROC|CONFIG_COMPAT_NETLINK_MESSAGES|\
CONFIG_BRCMUTIL|CONFIG_BRCMFMAC|\
CONFIG_MMC[^_]|CONFIG_MMC_BCM2835|CONFIG_MMC_SDHCI" \
            ${CONFIG}.backup > $CONFIG

          cat >> $CONFIG << 'DEFCONFIG_EOF'
CONFIG_DEBUG_INFO=y
CONFIG_DEBUG_INFO_DWARF5=y
CONFIG_DEBUG_INFO_BTF=y
CONFIG_DEBUG_INFO_NONE=n
CONFIG_DEBUG_INFO_REDUCED=n
CONFIG_DEBUG_INFO_SPLIT=n
CONFIG_BPF=y
CONFIG_BPF_SYSCALL=y
CONFIG_BPF_JIT=y
CONFIG_COMPAT_NETLINK_MESSAGES=y
CONFIG_WEXT_CORE=y
CONFIG_WEXT_PROC=y
CONFIG_CFG80211=y
CONFIG_MAC80211=y
CONFIG_BRCMUTIL=y
CONFIG_BRCMFMAC=y
CONFIG_BRCMFMAC_SDIO=y
CONFIG_BRCMFMAC_PROTO_BCDC=y
CONFIG_MMC=y
CONFIG_MMC_BCM2835=y
CONFIG_MMC_SDHCI=y
CONFIG_MMC_SDHCI_PLTFM=y
CONFIG_EXTRA_FIRMWARE="brcm/brcmfmac43455-sdio.bin brcm/brcmfmac43455-sdio.clm_blob brcm/brcmfmac43455-sdio.txt"
CONFIG_EXTRA_FIRMWARE_DIR="firmware"
DEFCONFIG_EOF

          echo "=== Final defconfig (last 40 lines) ==="
          tail -40 $CONFIG

      # 6. Patch build.config
      - name: Patch build.config
        run: |
          cd android-kernel
          echo "DEBUG_INFO=1" >> common/build.config.rpi || true

      # 7. Build kernel
      - name: Build kernel
        run: |
          cd android-kernel
          tools/bazel build //common:rpi4 --verbose_failures

      # 8. Find output files
      - name: Find output files
        run: |
          cd android-kernel

          echo "=== Searching for kernel outputs ==="

          SEARCH_PATHS=(
            "bazel-bin/common/rpi4/arch/arm64/boot"
            "bazel-bin/common/rpi4"
            "out/bazel/output_user_root/*/execroot/_main/bazel-bin/common/rpi4"
            "out/rpi4/dist"
            "common/out/rpi4/dist"
          )

          for path in "${SEARCH_PATHS[@]}"; do
            if [ -d "$path" ]; then
              echo "Found output directory: $path"
              find "$path" -type f \( -name "Image" -o -name "ramdisk*.img" -o -name "*.dtb" \) 2>/dev/null | head -10
            fi
          done

          echo "=== Broad search ==="
          find . -type f \( -name "Image" -o -name "ramdisk*.img" -o -name "*.dtb" \) -not -path "./.git/*" 2>/dev/null | head -20

      # 9. Copy boot files
      - name: Copy boot files
        run: |
          cd android-kernel

          mkdir -p android-boot-package

          POSSIBLE_PATHS=(
            "bazel-bin/common/rpi4/arch/arm64/boot/Image"
            "bazel-bin/common/rpi4/arch/arm64/boot/Image.gz"
            "bazel-bin/common/rpi4/Image"
            "out/bazel/output_user_root/*/execroot/_main/bazel-bin/common/rpi4/arch/arm64/boot/Image"
          )

          for path in "${POSSIBLE_PATHS[@]}"; do
            if ls $path 1> /dev/null 2>&1; then
              ACTUAL_IMAGE=$(ls $path 2>/dev/null | head -1)
              echo "Found kernel image at: $ACTUAL_IMAGE"
              cp "$ACTUAL_IMAGE" android-boot-package/Image
              break
            fi
          done

          RAMDISK_PATHS=(
            "bazel-bin/common/rpi4/ramdisk.img"
            "bazel-bin/common/rpi4/ramdisk-recovery.img"
            "out/bazel/output_user_root/*/execroot/_main/bazel-bin/common/rpi4/ramdisk*.img"
          )

          for pattern in "${RAMDISK_PATHS[@]}"; do
            for file in $pattern; do
              if [ -f "$file" ]; then
                cp "$file" android-boot-package/
                echo "Copied: $(basename $file)"
              fi
            done
          done

          DTB_PATHS=(
            "bazel-bin/common/rpi4/arch/arm64/boot/dts/broadcom/*.dtb"
            "bazel-bin/common/rpi4/*.dtb"
            "out/bazel/output_user_root/*/execroot/_main/bazel-bin/common/rpi4/arch/arm64/boot/dts/broadcom/*.dtb"
          )

          for pattern in "${DTB_PATHS[@]}"; do
            for file in $pattern; do
              if [ -f "$file" ]; then
                cp "$file" android-boot-package/
                echo "Copied: $(basename $file)"
              fi
            done
          done

          if [ -z "$(ls -A android-boot-package)" ]; then
            echo "Trying dist directory..."
            [ -d "bazel-bin/common/rpi4/dist" ] && cp bazel-bin/common/rpi4/dist/* android-boot-package/ 2>/dev/null || true
          fi

          echo "=== Final package contents ==="
          ls -la android-boot-package/

      # 10. Check bazel symlinks on failure
      - name: Check bazel symlinks
        if: failure()
        run: |
          cd android-kernel
          if [ -L "bazel-bin" ]; then
            echo "bazel-bin -> $(readlink bazel-bin)"
            REAL_PATH=$(readlink -f bazel-bin)
            find "$REAL_PATH" -type f \( -name "Image" -o -name "ramdisk*.img" -o -name "*.dtb" \) 2>/dev/null
          fi

      # 11. Upload boot package
      - name: Upload boot package
        uses: actions/upload-artifact@v4
        with:
          name: android-rpi4-boot-files
          path: android-kernel/android-boot-package/*
          if-no-files-found: warn

      # 12. Upload bazel output for debugging
      - name: Upload bazel output for analysis
        uses: actions/upload-artifact@v4
        with:
          name: bazel-output-debug
          path: android-kernel/bazel-bin/
          if-no-files-found: warn
        if: always()
