name: Build RPi4 Kernel with BTF and WiFi

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            repo git curl \
            build-essential \
            clang llvm lld \
            flex bison bc \
            libssl-dev libelf-dev \
            dwarves pahole

      # 3. Initialize Android kernel source
      - name: Init kernel repo
        run: |
          mkdir android-kernel
          cd android极
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-lts
          mkdir -p .repo/local_manifests
          curl -L https://raw.githubusercontent.com/raspberry-vanilla/android_kernel_manifest/android-极 -o .repo/local_manifests/rpi.xml
          repo sync -j$(nproc)

      # 4. Download WiFi firmware
      - name: Download WiFi firmware
        run: |
          cd android-kernel
          mkdir -p vendor/brcm/rpi4/proprietary/vendor/firmware/brcm
          curl -L https://raw.githubusercontent.com/RPi-Distro/firmware-nonfree/master/brcm/brcmfmac43455-sdio.bin \
            -o vendor/brcm/r极
          curl -L https://raw.githubusercontent.com/RPi-Distro/firmware-nonfree/master/brcm/brcmfmac43455-sdio.clm_blob \
            -o vendor/brcm/rpi4/proprietary/vendor/firmware/brcm/brcmfmac43455-sdio.clm_blob
          curl -L https://raw.githubusercontent.com/RPi-Distro/firmware-nonfree/master/brcm/brcm极 -o vendor/brcm/rpi极

      # 5. Fix defconfig
      - name: Fix defconfig
        run: |
          cd android-kernel
          CONFIG=common/arch/arm64/configs/android_rpi4_defconfig
          cp $CONFIG ${CONFIG}.backup
          grep -v "CONFIG_EXTRA_FIRMWARE" ${CONFIG}.backup | \
          grep -v "CONFIG_EXTRA_FIRMWARE_DIR" | \
          grep -v "regulatory.db" > $CONFIG

      # 6. Configure build options
      - name: Configure build options
        run: |
          cd android-kernel
          echo "DEBUG_INFO=1" > common/build.config.rpi
          echo 'KCONFIG_ADDITIONAL_OPTIONS="' >> common/build.config.rpi
          echo 'CONFIG_DEBUG_INFO=y' >> common/build.config.rpi
          echo 'CONFIG_DEBUG_INFO_DWARF5=y' >> common/build.config.rpi
          echo '极
          echo 'CONFIG_DEBUG_INFO_NONE=n' >> common/build.config.rpi
          echo 'CONFIG_DEBUG_INFO_REDUCED=n' >> common/build.config.rpi
          echo 'CONFIG_DEBUG_INFO_SPLIT极
          echo 'CONFIG_BPF=y' >> common/build.config.rpi
          echo 'CONFIG_BPF_SYSCALL=y' >> common/build.config极
          echo 'CONFIG_BPF_JIT=y' >> common/build.config.rpi
          echo 'CONFIG_WLAN=y' >> common/build.config.rpi
          echo 'CONFIG_WLAN_VENDOR_BROADCOM=y' >> common/build.config.rpi
          echo 'CONFIG_BRCMFMAC=m' >> common/build.config.rpi
          echo 'CONFIG_BRCMFMAC_SDIO=y' >> common/build.config.rpi
          echo 'CONFIG_CFG80211=y' >> common/build.config.rpi
          echo 'CONFIG_MAC80211=y' >> common/build.config.rpi
          echo 'CONFIG_RFKILL=y' >> common/build.config.rpi
          echo 'CONFIG_RFKILL_GPIO=y' >> common/build.config.rpi
          echo 'CONFIG_BT=y' >> common/build.config.rpi
          echo 'CONFIG_BT_BCM=y' >> common/build.config.rpi
          echo '"' >> common/build.config.rpi

      # 7. Build kernel
      - name: Build kernel
        run: |
          cd android-kernel
          tools/bazel build //common:rpi4 --verbose_failures

      # 8. Debug: Find all build outputs
      - name: Find build outputs
        run: |
          cd android-kernel
          echo "=== Searching for ALL build outputs ==="
          find . -name "Image" -type f 2>/dev/null | head -10
          find . -name "*.dtb" -type f 2>/dev/null | head -10
          find bazel-bin -type f 2>/dev/null | grep -E "(Image|\.dtb|vmlinux)" | head -20
          echo "=== Bazel output structure ==="
          ls -la bazel-bin/ 2>/dev/null || echo "bazel-bin not found"
          ls -la bazel-bin/common/ 2>/dev/null || echo "common not found"

      # 9. Copy ALL possible kernel files
      - name: Copy kernel files
        run: |
          cd android-kernel
          mkdir -p android-boot-package
          
          # Search for kernel image in multiple locations
          KERNEL_PATHS=$(find . -name "Image" -type f 2>/dev/null)
          if [ -n "$KERNEL_PATHS" ]; then
            for kernel in $KERNEL_PATHS; do
              cp "$kernel" android-boot-package/Image
              echo "✓ Copied Image from: $kernel"
              break
            done
          else
            echo "✗ No Image file found!"
          fi
          
          # Copy DTB files
          find . -name "*.dtb" -type f 2>/dev/null | head -10 | while read dtb; do
            cp "$dtb" android-boot-package/
            echo "✓ Copied $(basename $dtb)"
          done
          
          # Copy firmware
          mkdir -p android-boot-package/firmware/brcm
          if [ -d "vendor/brcm/rpi4/proprietary/vendor/firmware/brcm" ]; then
            cp vendor/brcm/rpi4/proprietary/vendor极 android-boot-package/firmware/brcm/
          fi
          
          echo "=== Final package contents ==="
          ls -la android-boot-package/

      # 10. Upload package
      - name: Upload boot package
        uses: actions/upload-artifact@v4
        with:
          name: android-rpi4-btf-wifi-kernel
          path: android-kernel/android-boot-package/
