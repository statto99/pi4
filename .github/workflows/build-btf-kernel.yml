name: Build RPi4 Kernel with BTF (WiFi Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            repo git curl \
            build-essential \
            clang llvm lld \
            flex bison bc \
            libssl-dev libelf-dev \
            dwarves pahole

      # 3. Initialize Android kernel source
      - name: Init kernel repo
        run: |
          mkdir android-kernel
          cd android-kernel

          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-lts

          mkdir -p .repo/local_manifests
          curl -L https://raw.githubusercontent.com/raspberry-vanilla/android_kernel_manifest/android-16.0/manifest_brcm_rpi.xml \
            -o .repo/local_manifests/rpi.xml

          repo sync -j$(nproc)

      # 4. FIRST check what's already in the config
      - name: Check existing config
        run: |
          cd android-kernel
          CONFIG=common/arch/arm64/configs/android_rpi4_defconfig
          echo "=== Checking existing WiFi/BT config ==="
          grep -E "(BRCM|WLAN|BT|MAC80211|FW_LOADER)" $CONFIG || true

      # 5. Patch defconfig CORRECTLY - only add what's missing
      - name: Patch defconfig for BTF
        run: |
          cd android-kernel

          CONFIG=common/arch/arm64/configs/android_rpi4_defconfig
          
          # Create a backup
          cp $CONFIG ${CONFIG}.backup
          
          # Remove any lines we're going to add (to avoid duplicates)
          grep -v "CONFIG_DEBUG_INFO" ${CONFIG}.backup | \
          grep -v "CONFIG_BPF" | \
          grep -v "CONFIG_DEBUG_INFO_BTF" > $CONFIG
          
          # Add ONLY BTF and essential configs
          cat <<EOF >> $CONFIG

          # --- Enable debug info (required for BTF) ---
          CONFIG_DEBUG_INFO=y
          CONFIG_DEBUG_INFO_DWARF5=y

          # --- Enable BTF ---
          CONFIG_DEBUG_INFO_BTF=y

          # --- Must be disabled for BTF ---
          CONFIG_DEBUG_INFO_NONE=n
          CONFIG_DEBUG_INFO_REDUCED=n
          CONFIG_DEBUG_INFO_SPLIT=n

          # --- BPF core ---
          CONFIG_BPF=y
          CONFIG_BPF_SYSCALL=y
          CONFIG_BPF_JIT=y

          EOF

      # 6. Add WiFi/BT configs via KCONFIG_ADDITIONAL_OPTIONS (safer)
      - name: Add WiFi configs via build.config
        run: |
          cd android-kernel
          
          # Add to build.config.rpi
          cat <<EOF >> common/build.config.rpi

          # WiFi/Bluetooth for RPi4
          KCONFIG_ADDITIONAL_OPTIONS="
          CONFIG_WLAN=y
          CONFIG_WLAN_VENDOR_BROADCOM=y
          CONFIG_BRCMUTIL=y
          CONFIG_BRCMFMAC=m
          CONFIG_BRCMFMAC_SDIO=y
          CONFIG_BRCMFMAC_PROTO_BCDC=y
          CONFIG_BRCMFMAC_PROTO_MSGBUF=y
          CONFIG_BRCM_TRACING=y
          CONFIG_BRCMDBG=y
          CONFIG_CFG80211=y
          CONFIG_MAC80211=y
          CONFIG_MAC80211_RC_MINSTREL=y
          CONFIG_MAC80211_RC_MINSTREL_HT=y
          CONFIG_MAC80211_RC_MINSTREL_VHT=y
          CONFIG_MAC80211_MESH=y
          CONFIG_RFKILL=y
          CONFIG_RFKILL_GPIO=y
          CONFIG_BT=y
          CONFIG_BT_BREDR=y
          CONFIG_BT_LE=y
          CONFIG_BT_BCM=y
          CONFIG_BT_HCIUART=y
          CONFIG_BT_HCIUART_BCM=y
          CONFIG_FW_LOADER=y
          CONFIG_FW_LOADER_USER_HELPER=y
          CONFIG_FW_LOADER_USER_HELPER_FALLBACK=y
          "
          EOF

      # 7. Ensure debug info is enabled
      - name: Enable debug info
        run: |
          cd android-kernel
          echo "DEBUG_INFO=1" >> common/build.config.rpi || true

      # 8. Build kernel
      - name: Build kernel
        run: |
          cd android-kernel
          tools/bazel build //common:rpi4 --verbose_failures

      # 9. Copy boot files
      - name: Copy boot files
        run: |
          cd android-kernel
          
          # Create package directory
          mkdir -p android-boot-package
          
          # Find kernel image
          KERNEL_IMAGE=$(find bazel-bin -name "Image" -type f 2>/dev/null | head -1)
          if [ -n "$KERNEL_IMAGE" ]; then
            cp "$KERNEL_IMAGE" android-boot-package/Image
            echo "✓ Copied Image"
          fi
          
          # Find DTB files
          DTB_FILES=$(find bazel-bin -name "*.dtb" -type f 2>/dev/null)
          for dtb in $DTB_FILES; do
            cp "$dtb" android-boot-package/
            echo "✓ Copied $(basename $dtb)"
          done
          
          # Show package contents
          echo "=== Package contents ==="
          ls -la android-boot-package/

      # 10. Upload boot package
      - name: Upload boot package
        uses: actions/upload-artifact@v4
        with:
          name: android-rpi4-btf-kernel
          path: android-kernel/android-boot-package/
