name: Build RPi4 Kernel with BTF (Android 16 - Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # 1. Checkout your repo (not strictly required, but standard)
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install dependencies (CRITICAL: pahole/dwarves)
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            repo git curl \
            build-essential \
            clang llvm lld \
            flex bison bc \
            libssl-dev libelf-dev \
            dwarves pahole \
            cpio

      # 3. Initialize Android kernel source (Kleaf)
      - name: Init kernel repo
        run: |
          mkdir android-kernel
          cd android-kernel

          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-lts

          mkdir -p .repo/local_manifests
          curl -L https://raw.githubusercontent.com/raspberry-vanilla/android_kernel_manifest/android-16.0/manifest_brcm_rpi.xml \
            -o .repo/local_manifests/rpi.xml

          repo sync -j$(nproc)

      # 4. Download missing regulatory.db file
      - name: Download regulatory.db
        run: |
          cd android-kernel
          mkdir -p vendor/brcm/rpi4/proprietary/vendor/firmware
          curl -L https://git.kernel.org/pub/scm/linux/kernel/git/sforshee/wireless-regdb.git/plain/regulatory.db \
            -o vendor/brcm/rpi4/proprietary/vendor/firmware/regulatory.db
          curl -L https://git.kernel.org/pub/scm/linux/kernel/git/sforshee/wireless-regdb.git/plain/regulatory.db.p7s \
            -o vendor/brcm/rpi4/proprietary/vendor/firmware/regulatory.db.p7s

      # 5. Patch kernel defconfig (enable BTF safely)
      - name: Patch defconfig (enable BTF safely)
        run: |
          cd android-kernel

          CONFIG=common/arch/arm64/configs/android_rpi4_defconfig

          cat <<EOF >> $CONFIG

          # --- REQUIRED: override Android default ---
          CONFIG_DEBUG_INFO_NONE=n

          # --- Enable debug info (required for BTF) ---
          CONFIG_DEBUG_INFO=y
          CONFIG_DEBUG_INFO_DWARF5=y

          # --- Enable BTF ---
          CONFIG_DEBUG_INFO_BTF=y
          CONFIG_DEBUG_INFO_BTF_MODULES=y

          # --- Must be disabled for BTF ---
          CONFIG_DEBUG_INFO_REDUCED=n
          CONFIG_DEBUG_INFO_SPLIT=n

          # --- BPF core ---
          CONFIG_BPF=y
          CONFIG_BPF_SYSCALL=y
          CONFIG_BPF_JIT=y

          # --- Disable built-in firmware to avoid missing file errors ---
          CONFIG_EXTRA_FIRMWARE=""
          CONFIG_EXTRA_FIRMWARE_DIR=""

          EOF

      # 6. Ensure Android build system keeps debug info
      - name: Patch build.config
        run: |
          cd android-kernel
          echo "DEBUG_INFO=1" >> common/build.config.rpi || true

      # 7. Build kernel using Bazel (Kleaf)
      - name: Build kernel
        run: |
          cd android-kernel
          tools/bazel build //common:rpi4 --verbose_failures

      # 8. Verify BTF exists (FAIL if missing)
      - name: Verify BTF
        run: |
          cd android-kernel

          echo "Checking for BTF section..."
          if readelf -S bazel-bin/common/rpi4/vmlinux | grep -q BTF; then
            echo "✓ BTF section found!"
            echo "BTF details:"
            readelf -S bazel-bin/common/rpi4/vmlinux | grep -A1 -B1 BTF
            
            # Also verify with pahole
            echo -e "\nVerifying BTF with pahole..."
            pahole --btf_encode_detached=test.btf bazel-bin/common/rpi4/vmlinux 2>/dev/null && echo "✓ BTF encoding successful" || echo "✗ BTF encoding failed"
          else
            echo "✗ BTF section NOT found!"
            exit 1
          fi

      # 9. Upload kernel artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpi4-btf-kernel
          path: |
            android-kernel/bazel-bin/common/rpi4/arch/arm64/boot/Image
            android-kernel/bazel-bin/common/rpi4/vmlinux
