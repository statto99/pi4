name: Build RPi4 Kernel with BTF + WiFi

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y repo git curl build-essential clang llvm lld flex bison bc libssl-dev libelf-dev dwarves pahole wget

      - name: Init kernel repo
        run: |
          mkdir android-kernel
          cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-lts
          mkdir -p .repo/local_manifests
          curl -L https://raw.githubusercontent.com/raspberry-vanilla/android_kernel_manifest/android-16.0/manifest_brcm_rpi.xml -o .repo/local_manifests/rpi.xml
          repo sync -j$(nproc)

      - name: Download RPi WiFi firmware
        run: |
          cd android-kernel
          mkdir -p common/firmware/brcm
          BASE="https://raw.githubusercontent.com/RPi-Distro/firmware-nonfree/master/debian/config/brcm80211/brcm"
          wget -q -O common/firmware/brcm/brcmfmac43455-sdio.bin "$BASE/brcmfmac43455-sdio.bin" || echo "Warning: could not download brcmfmac43455-sdio.bin"
          wget -q -O common/firmware/brcm/brcmfmac43455-sdio.clm_blob "$BASE/brcmfmac43455-sdio.clm_blob" || echo "Warning: could not download brcmfmac43455-sdio.clm_blob"
          wget -q -O common/firmware/brcm/brcmfmac43455-sdio.txt "$BASE/brcmfmac43455-sdio.txt" || echo "Warning: could not download brcmfmac43455-sdio.txt"
          ls -la common/firmware/brcm/

      - name: Patch defconfig for BTF + WiFi + uprobes
        run: |
          cd android-kernel
          CONFIG=common/arch/arm64/configs/android_rpi4_defconfig
          cp $CONFIG ${CONFIG}.backup

          grep -v -E "CONFIG_EXTRA_FIRMWARE|CONFIG_EXTRA_FIRMWARE_DIR|CONFIG_DEBUG_INFO[^_]|CONFIG_DEBUG_INFO_DWARF5|CONFIG_DEBUG_INFO_BTF|CONFIG_DEBUG_INFO_NONE|CONFIG_DEBUG_INFO_REDUCED|CONFIG_DEBUG_INFO_SPLIT|CONFIG_BPF[^_]|CONFIG_BPF_SYSCALL|CONFIG_BPF_JIT|CONFIG_CFG80211|CONFIG_MAC80211|CONFIG_WEXT_CORE|CONFIG_WEXT_PROC|CONFIG_COMPAT_NETLINK_MESSAGES|CONFIG_BRCMUTIL|CONFIG_BRCMFMAC|CONFIG_MMC[^_]|CONFIG_MMC_BCM2835|CONFIG_MMC_SDHCI|CONFIG_UPROBE_EVENTS|CONFIG_KPROBE_EVENTS|CONFIG_PERF_EVENTS|CONFIG_FTRACE|CONFIG_DYNAMIC_FTRACE|CONFIG_FUNCTION_TRACER|CONFIG_HAVE_KPROBES|CONFIG_KPROBES[^_]|CONFIG_KPROBES_ON_FTRACE|CONFIG_UPROBES|CONFIG_GENERIC_TRACER|CONFIG_TRACING" ${CONFIG}.backup > $CONFIG

          printf '%s\n' \
            'CONFIG_DEBUG_INFO=y' \
            'CONFIG_DEBUG_INFO_DWARF5=y' \
            'CONFIG_DEBUG_INFO_BTF=y' \
            'CONFIG_DEBUG_INFO_NONE=n' \
            'CONFIG_DEBUG_INFO_REDUCED=n' \
            'CONFIG_DEBUG_INFO_SPLIT=n' \
            'CONFIG_BPF=y' \
            'CONFIG_BPF_SYSCALL=y' \
            'CONFIG_BPF_JIT=y' \
            'CONFIG_KPROBES=y' \
            'CONFIG_KPROBE_EVENTS=y' \
            'CONFIG_UPROBES=y' \
            'CONFIG_UPROBE_EVENTS=y' \
            'CONFIG_PERF_EVENTS=y' \
            'CONFIG_FTRACE=y' \
            'CONFIG_DYNAMIC_FTRACE=y' \
            'CONFIG_FUNCTION_TRACER=y' \
            'CONFIG_KPROBES_ON_FTRACE=y' \
            'CONFIG_GENERIC_TRACER=y' \
            'CONFIG_TRACING=y' \
            'CONFIG_CFG80211=y' \
            'CONFIG_MAC80211=y' \
            'CONFIG_BRCMUTIL=y' \
            'CONFIG_BRCMFMAC=y' \
            'CONFIG_BRCMFMAC_SDIO=y' \
            'CONFIG_BRCMFMAC_PROTO_BCDC=y' \
            'CONFIG_MMC=y' \
            'CONFIG_MMC_BCM2835=y' \
            'CONFIG_MMC_SDHCI=y' \
            'CONFIG_MMC_SDHCI_PLTFM=y' \
            'CONFIG_EXTRA_FIRMWARE="brcm/brcmfmac43455-sdio.bin brcm/brcmfmac43455-sdio.clm_blob brcm/brcmfmac43455-sdio.txt"' \
            'CONFIG_EXTRA_FIRMWARE_DIR="firmware"' \
            >> $CONFIG

          echo "=== Final defconfig (last 35 lines) ==="
          tail -35 $CONFIG
          
      - name: Patch build.config
        run: |
          cd android-kernel
          echo "DEBUG_INFO=1" >> common/build.config.rpi || true

      - name: Build kernel
        run: |
          cd android-kernel
          tools/bazel build //common:rpi4 --verbose_failures

      - name: Find output files
        run: |
          cd android-kernel
          echo "=== Searching for kernel outputs ==="
          for path in "bazel-bin/common/rpi4/arch/arm64/boot" "bazel-bin/common/rpi4" "out/rpi4/dist" "common/out/rpi4/dist"; do
            if [ -d "$path" ]; then
              echo "Found: $path"
              find "$path" -type f \( -name "Image" -o -name "ramdisk*.img" -o -name "*.dtb" \) 2>/dev/null | head -10
            fi
          done
          echo "=== Broad search ==="
          find . -type f \( -name "Image" -o -name "ramdisk*.img" -o -name "*.dtb" \) -not -path "./.git/*" 2>/dev/null | head -20

      - name: Copy boot files
        run: |
          cd android-kernel
          mkdir -p android-boot-package
          for path in "bazel-bin/common/rpi4/arch/arm64/boot/Image" "bazel-bin/common/rpi4/arch/arm64/boot/Image.gz" "bazel-bin/common/rpi4/Image"; do
            if [ -f "$path" ]; then
              echo "Found kernel image at: $path"
              cp "$path" android-boot-package/Image
              break
            fi
          done
          for file in bazel-bin/common/rpi4/ramdisk.img bazel-bin/common/rpi4/ramdisk-recovery.img; do
            if [ -f "$file" ]; then
              cp "$file" android-boot-package/
              echo "Copied: $(basename $file)"
            fi
          done
          for file in bazel-bin/common/rpi4/arch/arm64/boot/dts/broadcom/*.dtb bazel-bin/common/rpi4/*.dtb; do
            if [ -f "$file" ]; then
              cp "$file" android-boot-package/
              echo "Copied: $(basename $file)"
            fi
          done
          if [ -z "$(ls -A android-boot-package)" ]; then
            echo "Trying dist directory..."
            [ -d "bazel-bin/common/rpi4/dist" ] && cp bazel-bin/common/rpi4/dist/* android-boot-package/ 2>/dev/null || true
          fi
          echo "=== Final package contents ==="
          ls -la android-boot-package/

      - name: Check bazel symlinks
        if: failure()
        run: |
          cd android-kernel
          if [ -L "bazel-bin" ]; then
            echo "bazel-bin -> $(readlink bazel-bin)"
            find "$(readlink -f bazel-bin)" -type f \( -name "Image" -o -name "ramdisk*.img" -o -name "*.dtb" \) 2>/dev/null
          fi

      - name: Upload boot package
        uses: actions/upload-artifact@v4
        with:
          name: android-rpi4-boot-files
          path: android-kernel/android-boot-package/*
          if-no-files-found: warn

      - name: Upload bazel output for debugging
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bazel-output-debug
          path: android-kernel/bazel-bin/
          if-no-files-found: warn
