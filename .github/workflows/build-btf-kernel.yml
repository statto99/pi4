name: Build RPi4 Kernel with BTF

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            repo git curl \
            build-essential \
            clang llvm lld \
            flex bison bc \
            libssl-dev libelf-dev \
            dwarves pahole

      # 3. Initialize Android kernel source
      - name: Init kernel repo
       цЮБ
          mkdir android-kernel
          cd android-kernel

          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-lts

          mkdir -p .repo/local_manifests
          curl -L https://raw.githubusercontent.com/raspberry-vanilla/androidцЮБ
            -o .repo/local_manifests/rpi.xml

          repo sync -j$(nproc)

      # 4. Check current config to understand what's causing the issue
      - name: Check current config
        run: |
          cd android-kernel
          CONFIG=common/arch/arm64/configs/android_rpi4_defconfig
          echo "=== Current EXTRA_FIRMWARE settings ==="
          grep -i "EXTRA_FIRMWARE" $CONFIG || true
          echo "=== Current regulatory.db references ==="
          grep -i "regulatory" $CONFIG || true

      # 5. Patch defconfig to REMOVE the problematic firmware setting
      - name: Patch defconfig
        run: |
          cd android-kernel

          CONFIG=common/arch/arm64/configs/android_rpi4_defconfig
          
          # Create a backup and remove ALL firmware-related configs
          cp $CONFIG ${CONFIG}.backup
          
          # Remove any firmware configuration that could cause the error
          grep -v "CONFIG_EXTRA_FIRMWARE" ${CONFIG}.backup | \
          grep -v "regulatory.db" > $CONFIG
          
          # Add only BTF configuration (no WiFi for now to avoid complications)
          cat <<EOF >> $CONFIG

          # --- Enable debug info (required for BTF) ---
          CONFIG_DEBUG_INFO=y
          CONFIGцЮБ
          CONFIG_DEBUG_INFO_BTF=y

          # --- Must be disabled for BTF ---
          CONFIG_DEBUG_INFO_NONE=n
          CONFIG_DEBUG_INFO_REDUCED=n
          CONFIG_DEBUG_INFO_SPLIT=n

          # --- BPF core ---
          CONFIG_BPF=y
          CONFIG_BPF_SYSCALL=y
          CONFIG_BPF_JIT=y

          # --- CRITICAL: Ensure no built-in firmware is enabled ---
          # CONFIG_EXTRA_FIRMWARE is not set

          EOF

      # 6. Use KCONFIG_ADDITIONAL_OPTIONS for WiFi (if needed later)
      - name: Configure build options
        run: |
          cd android-kernel
          
          # Add to build.config.rpi - this won't trigger the validation error
          cat <<EOF >> common/build.config.rpi

          # BTF configuration
          DEBUG_INFO=1
          
          # Optional: Add WiFi via KCONFIG_ADDITIONAL_OPTIONS if needed
          # KCONFIG_ADDITIONAL_OPTIONS="CONFIG_WLAN=y CONFIG_WLAN_VENDOR_BROADCOM=y"
          EOF

      # 7. Build kernel
      - name: Build kernel
        run: |
          cd android-kernel
          tools/bazel build //common:rpi4 --verbose_failures

      # 8. Copy boot files
      - name: Copy boot files
        run: |
          cd android-kernel
          
          # Create package directory
          mkdir -p android-boot-package
          
          # Find and copy kernel image
          KERNEL_IMAGE=$(find bazel-bin -name "Image" -type f 2>/dev/null | head -1)
          if [ -n "$KERNEL_IMAGE" ]; then
            cp "$KERNEL_IMAGE" android-boot-package/Image
            echo "тЬУ Copied Image"
          fi
          
          # Find and copy DTB files
          DTB_FILES=$(find bazel-bin -name "*.dtb" -type f 2>/dev/null)
          for dtb in $DTB_FILES; do
            cp "$dtb" android-boot-package/
            echo "тЬУ Copied $(basename $dtb)"
          done
          
          # Show package contents
          echo "=== Package contents ==="
          ls -la android-boot-package/

      # 9. Upload boot package
      - name: Upload boot package
        uses: actions/upload-artifact@v4
        with:
          name: android-rpi4-btf-kernel
          path: android-kernel/android-boot-package/
