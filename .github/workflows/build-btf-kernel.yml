name: Build RPi4 Kernel with BTF + WiFi (Diagnostic)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y repo git curl build-essential clang llvm lld flex bison bc libssl-dev libelf-dev dwarves pahole wget

      - name: Init kernel repo
        run: |
          mkdir android-kernel
          cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-lts
          mkdir -p .repo/local_manifests
          curl -L https://raw.githubusercontent.com/raspberry-vanilla/android_kernel_manifest/android-16.0/manifest_brcm_rpi.xml -o .repo/local_manifests/rpi.xml
          repo sync -j$(nproc)

      - name: Diagnose Kconfig dependencies
        run: |
          cd android-kernel

          echo "=== Checking if WEXT symbols are user-selectable ==="
          grep -n "WEXT_CORE\|WEXT_PROC\|COMPAT_NETLINK_MESSAGES" common/net/wireless/Kconfig || echo "Not found in wireless/Kconfig"
          grep -rn "WEXT_CORE\|WEXT_PROC\|COMPAT_NETLINK_MESSAGES" common/net/Kconfig || echo "Not found in net/Kconfig"
          grep -rn "config WEXT_CORE\|config WEXT_PROC\|config COMPAT_NETLINK_MESSAGES" common/ || echo "Kconfig entries not found"

          echo ""
          echo "=== What selects WEXT_CORE ==="
          grep -rn "select WEXT_CORE\|depends.*WEXT_CORE" common/ || echo "Nothing selects WEXT_CORE"

          echo ""
          echo "=== What selects COMPAT_NETLINK_MESSAGES ==="
          grep -rn "select COMPAT_NETLINK_MESSAGES\|depends.*COMPAT_NETLINK_MESSAGES" common/ || echo "Nothing selects COMPAT_NETLINK_MESSAGES"

          echo ""
          echo "=== CFG80211 Kconfig entry ==="
          grep -A 30 "^config CFG80211$" common/net/wireless/Kconfig || echo "CFG80211 not found"

          echo ""
          echo "=== Current rpi4 defconfig WEXT/COMPAT entries ==="
          grep -i "wext\|compat_netlink\|cfg80211\|mac80211\|brcm" common/arch/arm64/configs/android_rpi4_defconfig || echo "None found"

      - name: Download RPi WiFi firmware
        run: |
          cd android-kernel
          mkdir -p common/firmware/brcm
          BASE="https://raw.githubusercontent.com/RPi-Distro/firmware-nonfree/master/debian/config/brcm80211/brcm"
          wget -q -O common/firmware/brcm/brcmfmac43455-sdio.bin "$BASE/brcmfmac43455-sdio.bin" || echo "Warning: could not download brcmfmac43455-sdio.bin"
          wget -q -O common/firmware/brcm/brcmfmac43455-sdio.clm_blob "$BASE/brcmfmac43455-sdio.clm_blob" || echo "Warning: could not download brcmfmac43455-sdio.clm_blob"
          wget -q -O common/firmware/brcm/brcmfmac43455-sdio.txt "$BASE/brcmfmac43455-sdio.txt" || echo "Warning: could not download brcmfmac43455-sdio.txt"
          ls -la common/firmware/brcm/

      - name: Patch defconfig for BTF + WiFi
        run: |
          cd android-kernel
          CONFIG=common/arch/arm64/configs/android_rpi4_defconfig
          cp $CONFIG ${CONFIG}.backup
          grep -v -E "CONFIG_EXTRA_FIRMWARE|CONFIG_EXTRA_FIRMWARE_DIR|CONFIG_DEBUG_INFO[^_]|CONFIG_DEBUG_INFO_DWARF5|CONFIG_DEBUG_INFO_BTF|CONFIG_DEBUG_INFO_NONE|CONFIG_DEBUG_INFO_REDUCED|CONFIG_DEBUG_INFO_SPLIT|CONFIG_BPF[^_]|CONFIG_BPF_SYSCALL|CONFIG_BPF_JIT|CONFIG_CFG80211|CONFIG_MAC80211|CONFIG_WEXT_CORE|CONFIG_WEXT_PROC|CONFIG_COMPAT_NETLINK_MESSAGES|CONFIG_BRCMUTIL|CONFIG_BRCMFMAC|CONFIG_MMC[^_]|CONFIG_MMC_BCM2835|CONFIG_MMC_SDHCI" ${CONFIG}.backup > $CONFIG
          printf '%s\n' \
            'CONFIG_DEBUG_INFO=y' \
            'CONFIG_DEBUG_INFO_DWARF5=y' \
            'CONFIG_DEBUG_INFO_BTF=y' \
            'CONFIG_DEBUG_INFO_NONE=n' \
            'CONFIG_DEBUG_INFO_REDUCED=n' \
            'CONFIG_DEBUG_INFO_SPLIT=n' \
            'CONFIG_BPF=y' \
            'CONFIG_BPF_SYSCALL=y' \
            'CONFIG_BPF_JIT=y' \
            'CONFIG_COMPAT_NETLINK_MESSAGES=y' \
            'CONFIG_WEXT_CORE=y' \
            'CONFIG_WEXT_PROC=y' \
            'CONFIG_CFG80211=y' \
            'CONFIG_MAC80211=y' \
            'CONFIG_BRCMUTIL=y' \
            'CONFIG_BRCMFMAC=y' \
            'CONFIG_BRCMFMAC_SDIO=y' \
            'CONFIG_BRCMFMAC_PROTO_BCDC=y' \
            'CONFIG_MMC=y' \
            'CONFIG_MMC_BCM2835=y' \
            'CONFIG_MMC_SDHCI=y' \
            'CONFIG_MMC_SDHCI_PLTFM=y' \
            'CONFIG_EXTRA_FIRMWARE="brcm/brcmfmac43455-sdio.bin brcm/brcmfmac43455-sdio.clm_blob brcm/brcmfmac43455-sdio.txt"' \
            'CONFIG_EXTRA_FIRMWARE_DIR="firmware"' \
            >> $CONFIG

          echo "=== Verifying lines were written correctly (grep check) ==="
          grep "WEXT_CORE\|WEXT_PROC\|COMPAT_NETLINK" $CONFIG
          echo "=== Raw hex of last 5 lines to check for hidden characters ==="
          tail -5 $CONFIG | xxd | head -20
          echo "=== Final defconfig (last 30 lines) ==="
          tail -30 $CONFIG

      - name: Patch build.config
        run: |
          cd android-kernel
          echo "DEBUG_INFO=1" >> common/build.config.rpi || true

      - name: Build kernel
        run: |
          cd android-kernel
          tools/bazel build //common:rpi4 --verbose_failures
