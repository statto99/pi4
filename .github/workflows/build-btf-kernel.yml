name: Build RPi4 Kernel with BTF

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            repo git curl \
            build-essential \
            clang llvm lld \
            flex bison bc \
            libssl-dev libelf-dev \
            dwarves pahole

      # 3. Initialize Android kernel source
      - name: Init kernel repo
        run: |
          mkdir android-kernel
          cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-lts
          mkdir -p .repo/local_manifests
          curl -L https://raw.githubusercontent.com/raspberry-vanilla/android_kernel_manifest/android-16.0/manifest_brcm_rpi.xml \
            -o .repo/local_manifests/rpi.xml
          repo sync -j$(nproc)

      # 4. Patch defconfig for BTF + Tracing + Debugging
      - name: Patch defconfig for BTF + uprobes
        run: |
          cd android-kernel
          CONFIG=common/arch/arm64/configs/android_rpi4_defconfig
          cp $CONFIG ${CONFIG}.backup
          
          # Clean out existing versions of the requested flags
          grep -v -E "CONFIG_DEBUG_FS|CONFIG_DEBUG_KERNEL|CONFIG_BPF|CONFIG_FTRACE|CONFIG_TRACING|CONFIG_DYNAMIC_FTRACE|CONFIG_KPROBE|CONFIG_UPROBE|CONFIG_RETPROBES|CONFIG_PROBE_EVENTS|CONFIG_EVENT_TRACING|CONFIG_PERF_EVENTS|CONFIG_DEBUG_INFO|CONFIG_KALLSYMS|CONFIG_IKCONFIG|CONFIG_FRAME_POINTER|CONFIG_STRIP_ASM_SYMS|CONFIG_SECURITY_SELINUX_DEVELOP|CONFIG_SECURITY_PERF_EVENTS_RESTRICT|CONFIG_CGROUP_BPF|CONFIG_FUNCTION_ERROR_INJECTION|CONFIG_BPF_KPROBE_OVERRIDE" \
            ${CONFIG}.backup > $CONFIG

          # Append your requested options
          printf '%s\n' \
            'CONFIG_DEBUG_FS=y' \
            'CONFIG_DEBUG_KERNEL=y' \
            'CONFIG_BPF=y' \
            'CONFIG_BPF_SYSCALL=y' \
            'CONFIG_BPF_JIT=y' \
            'CONFIG_BPF_JIT_ALWAYS_ON=y' \
            'CONFIG_BPF_EVENTS=y' \
            'CONFIG_CGROUP_BPF=y' \
            'CONFIG_FTRACE=y' \
            'CONFIG_FUNCTION_TRACER=y' \
            'CONFIG_TRACING=y' \
            'CONFIG_DYNAMIC_FTRACE=y' \
            'CONFIG_FTRACE_SYSCALLS=y' \
            'CONFIG_KPROBES=y' \
            'CONFIG_KPROBE_EVENTS=y' \
            'CONFIG_UPROBES=y' \
            'CONFIG_UPROBE_EVENTS=y' \
            'CONFIG_PROBE_EVENTS=y' \
            'CONFIG_EVENT_TRACING=y' \
            'CONFIG_PERF_EVENTS=y' \
            'CONFIG_DEBUG_INFO=y' \
            'CONFIG_DEBUG_INFO_BTF=y' \
            'CONFIG_DEBUG_INFO_DWARF5=y' \
            'CONFIG_KALLSYMS=y' \
            'CONFIG_KALLSYMS_ALL=y' \
            'CONFIG_IKCONFIG=y' \
            'CONFIG_IKCONFIG_PROC=y' \
            'CONFIG_FRAME_POINTER=y' \
            'CONFIG_STRIP_ASM_SYMS=n' \
            'CONFIG_FUNCTION_ERROR_INJECTION=y' \
            'CONFIG_BPF_KPROBE_OVERRIDE=y' \
            'CONFIG_SECURITY_SELINUX_DEVELOP=y' \
            'CONFIG_SECURITY_PERF_EVENTS_RESTRICT=n' \
            >> $CONFIG
          
          echo "=== Final defconfig validation (last 40 lines) ==="
          tail -40 $CONFIG

      # 5. Patch build.config
      - name: Patch build.config
        run: |
          cd android-kernel
          echo "DEBUG_INFO=1" >> common/build.config.rpi || true

      # 6. Build kernel
      - name: Build kernel
        run: |
          cd android-kernel
          tools/bazel build //common:rpi4 --verbose_failures

      # 7. Find the actual output directory
      - name: Find output files
        run: |
          cd android-kernel
          echo "=== Searching for kernel outputs ==="
          SEARCH_PATHS=(
            "bazel-bin/common/rpi4/arch/arm64/boot"
            "bazel-bin/common/rpi4"
            "out/bazel/output_user_root/*/execroot/_main/bazel-bin/common/rpi4"
            "out/rpi4/dist"
            "common/out/rpi4/dist"
          )
          for path in "${SEARCH_PATHS[@]}"; do
            if [ -d "$path" ]; then
              echo "Found output directory: $path"
              find "$path" -type f \( -name "Image" -o -name "ramdisk*.img" -o -name "*.dtb" \) 2>/dev/null | head -10
            fi
          done

      # 8. Copy files from the correct Android output location
      - name: Copy boot files
        run: |
          cd android-kernel
          mkdir -p android-boot-package
          POSSIBLE_PATHS=(
            "bazel-bin/common/rpi4/arch/arm64/boot/Image"
            "bazel-bin/common/rpi4/Image"
          )
          for path in "${POSSIBLE_PATHS[@]}"; do
            if [ -f "$path" ]; then
              cp "$path" android-boot-package/Image
              echo "Copied Image from $path"
              break
            fi
          done
          # Copy DTBs and Ramdisks (simplified for brevity, keeping your logic)
          find bazel-bin/common/rpi4 -name "*.dtb" -exec cp {} android-boot-package/ \;
          find bazel-bin/common/rpi4 -name "ramdisk*.img" -exec cp {} android-boot-package/ \;
          
          echo "=== Final package contents ==="
          ls -la android-boot-package/

      # 10. Upload boot package
      - name: Upload boot package
        uses: actions/upload-artifact@v4
        with:
          name: android-rpi4-boot-files
          path: android-kernel/android-boot-package/*
