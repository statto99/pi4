name: Build RPi4 Kernel with BTF

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            repo git curl \
            build-essential \
            clang llvm lld \
            flex bison bc \
            libssl-dev libelf-dev \
            dwarves pahole rsync

      # 3. Initialize Android kernel source
      - name: Init kernel repo
        run: |
          mkdir -p android-kernel
          cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-lts
          mkdir -p .repo/local_manifests
          curl -L https://raw.githubusercontent.com/raspberry-vanilla/android_kernel_manifest/android-16.0/manifest_brcm_rpi.xml \
            -o .repo/local_manifests/rpi.xml
          repo sync -j$(nproc)

      # 3.5 Fix missing firmware dependency (Fixes regulatory.db error)
      - name: Fix missing regulatory firmware
        run: |
          cd android-kernel
          # Create the directory structure the build expects
          mkdir -p vendor/brcm/rpi4/proprietary/vendor/firmware/
          
          # Download the real regulatory.db from the official Linux firmware repo
          curl -L https://git.kernel.org/pub/scm/linux/kernel/git/sforshee/wireless-regdb.git/plain/regulatory.db \
            -o vendor/brcm/rpi4/proprietary/vendor/firmware/regulatory.db
          
          # Provide the public key signature as well
          curl -L https://git.kernel.org/pub/scm/linux/kernel/git/sforshee/wireless-regdb.git/plain/regulatory.db.p7s \
            -o vendor/brcm/rpi4/proprietary/vendor/firmware/regulatory.db.p7s

      # 4. Patch defconfig for BTF, BPF, and Tracing
      - name: Patch defconfig with critical tracing options
        run: |
          cd android-kernel
          CONFIG=common/arch/arm64/configs/android_rpi4_defconfig
          cp $CONFIG ${CONFIG}.backup
          
          # 1. Clean out existing versions to prevent Kleaf "actual vs expected" mismatches
          grep -v -E "CONFIG_DEBUG_FS|CONFIG_DEBUG_KERNEL|CONFIG_BPF|CONFIG_FTRACE|CONFIG_TRACING|CONFIG_DYNAMIC_FTRACE|CONFIG_KPROBE|CONFIG_UPROBE|CONFIG_RETPROBES|CONFIG_PROBE_EVENTS|CONFIG_EVENT_TRACING|CONFIG_PERF_EVENTS|CONFIG_DEBUG_INFO|CONFIG_KALLSYMS|CONFIG_IKCONFIG|CONFIG_FRAME_POINTER|CONFIG_STRIP_ASM_SYMS|CONFIG_SECURITY_SELINUX_DEVELOP|CONFIG_SECURITY_PERF_EVENTS_RESTRICT|CONFIG_CGROUP_BPF" \
            ${CONFIG}.backup > $CONFIG

          # 2. Append RPi4-relevant BPF/BTF/Debug options
          # Note: Removed auto-selected ANON_INODES and RETPROBES to satisfy Kleaf check
          printf '%s\n' \
            'CONFIG_DEBUG_FS=y' \
            'CONFIG_DEBUG_KERNEL=y' \
            'CONFIG_BPF=y' \
            'CONFIG_BPF_SYSCALL=y' \
            'CONFIG_BPF_JIT=y' \
            'CONFIG_BPF_JIT_ALWAYS_ON=y' \
            'CONFIG_BPF_EVENTS=y' \
            'CONFIG_CGROUP_BPF=y' \
            'CONFIG_FTRACE=y' \
            'CONFIG_FUNCTION_TRACER=y' \
            'CONFIG_TRACING=y' \
            'CONFIG_DYNAMIC_FTRACE=y' \
            'CONFIG_FTRACE_SYSCALLS=y' \
            'CONFIG_KPROBES=y' \
            'CONFIG_KPROBE_EVENTS=y' \
            'CONFIG_UPROBES=y' \
            'CONFIG_UPROBE_EVENTS=y' \
            'CONFIG_PROBE_EVENTS=y' \
            'CONFIG_EVENT_TRACING=y' \
            'CONFIG_PERF_EVENTS=y' \
            'CONFIG_DEBUG_INFO=y' \
            'CONFIG_DEBUG_INFO_BTF=y' \
            'CONFIG_DEBUG_INFO_DWARF5=y' \
            'CONFIG_KALLSYMS=y' \
            'CONFIG_KALLSYMS_ALL=y' \
            'CONFIG_IKCONFIG=y' \
            'CONFIG_IKCONFIG_PROC=y' \
            'CONFIG_FRAME_POINTER=y' \
            'CONFIG_STRIP_ASM_SYMS=n' \
            'CONFIG_SECURITY_SELINUX_DEVELOP=y' \
            'CONFIG_SECURITY_PERF_EVENTS_RESTRICT=n' \
            >> $CONFIG

          echo "=== Final defconfig validation (last 50 lines) ==="
          tail -50 $CONFIG

      # 5. Build Kernel using Bazel/Kleaf
      - name: Build RPi4 Kernel
        run: |
          cd android-kernel
          # We use --sandbox_debug to see file mapping issues if it fails again
          tools/bazel run //common:rpi4_dist -- --dist_dir=out/dist

      # 6. Prepare boot package
      - name: Prepare boot package
        run: |
          cd android-kernel
          mkdir -p android-boot-package
          echo "=== Copying build artifacts ==="
          cp out/dist/Image android-boot-package/
          cp out/dist/*.dtb android-boot-package/ 2>/dev/null || true
          
          # Check for overlays
          if [ -d "out/dist/overlays" ]; then
            cp -r out/dist/overlays android-boot-package/
          fi
          
          echo "=== Final package contents ==="
          ls -la android-boot-package/

      # 7. Upload boot package
      - name: Upload boot package
        uses: actions/upload-artifact@v4
        with:
          name: android-rpi4-bpf-kernel
          path: android-kernel/android-boot-package/*
          if-no-files-found: error
