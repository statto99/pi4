name: Build RPi4 Kernel (Android 13) with BTF

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            repo git curl \
            build-essential \
            clang llvm lld \
            flex bison bc \
            libssl-dev libelf-dev \
            dwarves pahole

      # 3. Corrected Initialization: Using RPi manifest as the primary source
      - name: Init kernel repo
        run: |
          mkdir android-kernel
          cd android-kernel
          # We point directly to the Raspberry Vanilla manifest repository
          repo init -u https://github.com/raspberry-vanilla/android_kernel_manifest -b android-13.0 -m manifest_brcm_rpi4.xml
          repo sync -j$(nproc)

      # 4. Patching with verified paths
      - name: Patch defconfig for BTF + uprobes
        run: |
          cd android-kernel
          # Now that we have the right kernel, this find will succeed
          CONFIG_PATH=$(find . -name "android_rpi4_defconfig" | head -n 1)
          
          if [ -z "$CONFIG_PATH" ]; then
            echo "!! ERROR: android_rpi4_defconfig still not found !!"
            find . -name "*defconfig" | head -n 20
            exit 1
          fi
          
          echo "Found config at: $CONFIG_PATH"
          cp "$CONFIG_PATH" "${CONFIG_PATH}.backup"
          
          # Clean and Inject BTF/BPF configs
          grep -v -E "CONFIG_DEBUG_INFO[^_]|CONFIG_DEBUG_INFO_DWARF5|CONFIG_DEBUG_INFO_BTF|CONFIG_DEBUG_INFO_NONE|CONFIG_DEBUG_INFO_REDUCED|CONFIG_DEBUG_INFO_SPLIT|CONFIG_BPF[^_]|CONFIG_BPF_SYSCALL|CONFIG_BPF_JIT|CONFIG_KPROBES[^_]|CONFIG_KPROBE_EVENTS|CONFIG_UPROBES|CONFIG_UPROBE_EVENTS|CONFIG_PERF_EVENTS|CONFIG_FTRACE[^_]|CONFIG_DYNAMIC_FTRACE|CONFIG_FUNCTION_TRACER|CONFIG_GENERIC_TRACER|CONFIG_TRACING|CONFIG_EXTRA_FIRMWARE|CONFIG_BPF_KPROBE_OVERRIDE|CONFIG_FUNCTION_ERROR_INJECTION|CONFIG_BPF_EVENTS" \
            "${CONFIG_PATH}.backup" > "$CONFIG_PATH"
            
          printf '%s\n' \
            'CONFIG_DEBUG_INFO=y' \
            'CONFIG_DEBUG_INFO_DWARF5=y' \
            'CONFIG_DEBUG_INFO_BTF=y' \
            'CONFIG_BPF=y' \
            'CONFIG_BPF_SYSCALL=y' \
            'CONFIG_BPF_JIT=y' \
            'CONFIG_KPROBES=y' \
            'CONFIG_KPROBE_EVENTS=y' \
            'CONFIG_UPROBES=y' \
            'CONFIG_UPROBE_EVENTS=y' \
            'CONFIG_PERF_EVENTS=y' \
            'CONFIG_FTRACE=y' \
            'CONFIG_DYNAMIC_FTRACE=y' \
            'CONFIG_FUNCTION_TRACER=y' \
            'CONFIG_TRACING=y' \
            'CONFIG_FUNCTION_ERROR_INJECTION=y' \
            'CONFIG_BPF_KPROBE_OVERRIDE=y' \
            'CONFIG_BPF_EVENTS=y' \
            >> "$CONFIG_PATH"

      - name: Build and Distribute Kernel
        run: |
          cd android-kernel
          # Added --local_ram_resources=HOST_RAM*.6 to prevent OOM crashes on the runner
          tools/bazel run //common:rpi4_dist -- --dist_dir=out/dist --local_ram_resources=HOST_RAM*.6

      - name: Prepare Artifacts
        run: |
          cd android-kernel
          mkdir -p android-boot-package
          if [ -d "out/dist" ]; then
            cp out/dist/Image android-boot-package/ 2>/dev/null || true
            cp out/dist/*.dtb android-boot-package/ 2>/dev/null || true
            cp out/dist/ramdisk.img android-boot-package/ 2>/dev/null || true
            [ -d "out/dist/overlays" ] && cp -r out/dist/overlays android-boot-package/
          fi
          ls -la android-boot-package/

      - name: Upload Boot Package
        uses: actions/upload-artifact@v4
        with:
          name: android13-rpi4-btf-kernel
          path: android-kernel/android-boot-package/
          if-no-files-found: error
