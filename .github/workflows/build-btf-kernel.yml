name: Build RPi4 Kernel (Android 12.1) with BTF

on:
  workflow_dispatch:

# Set the environment variable at the top level to apply to all steps
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # ubuntu-22.04 is still the "sweet spot" for Android 12 toolchains, 
    # but the runner will now use Node 24 for the Actions themselves.
    runs-on: ubuntu-22.04

    steps:
      # 1. Checkout (Now forced to run on Node 24 via the env var)
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            repo git curl \
            build-essential \
            libncurses5-dev \
            flex bison bc \
            libssl-dev libelf-dev \
            dwarves pahole

      # 3. Initialize Android kernel source (Android 12.1 branch)
      - name: Init kernel repo
        run: |
          mkdir android-kernel
          cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android12-5.10
          mkdir -p .repo/local_manifests
          curl -L https://raw.githubusercontent.com/raspberry-vanilla/android_kernel_manifest/android-12.1/manifest_brcm_rpi.xml \
            -o .repo/local_manifests/rpi.xml
          repo sync -j$(nproc)

      # 4. Patch defconfig for BTF + BPF
      - name: Patch defconfig for BTF + uprobes
        run: |
          cd android-kernel
          CONFIG=common/arch/arm64/configs/android_rpi4_defconfig
          [ ! -f "$CONFIG" ] && CONFIG=$(find common -name "android_rpi4_defconfig")
          
          cp $CONFIG ${CONFIG}.backup
          
          # Remove conflicting lines
          grep -v -E "CONFIG_DEBUG_INFO[^_]|CONFIG_DEBUG_INFO_BTF|CONFIG_BPF[^_]|CONFIG_BPF_SYSCALL|CONFIG_BPF_JIT|CONFIG_KPROBES[^_]|CONFIG_KPROBE_EVENTS|CONFIG_UPROBES|CONFIG_UPROBE_EVENTS|CONFIG_PERF_EVENTS|CONFIG_FTRACE[^_]|CONFIG_DYNAMIC_FTRACE|CONFIG_FUNCTION_TRACER|CONFIG_TRACING|CONFIG_BPF_KPROBE_OVERRIDE|CONFIG_FUNCTION_ERROR_INJECTION|CONFIG_BPF_EVENTS" \
            ${CONFIG}.backup > $CONFIG
          
          # Add BTF/BPF configs
          printf '%s\n' \
            'CONFIG_DEBUG_INFO=y' \
            'CONFIG_DEBUG_INFO_BTF=y' \
            'CONFIG_BPF=y' \
            'CONFIG_BPF_SYSCALL=y' \
            'CONFIG_BPF_JIT=y' \
            'CONFIG_KPROBES=y' \
            'CONFIG_KPROBE_EVENTS=y' \
            'CONFIG_UPROBES=y' \
            'CONFIG_UPROBE_EVENTS=y' \
            'CONFIG_PERF_EVENTS=y' \
            'CONFIG_FTRACE=y' \
            'CONFIG_DYNAMIC_FTRACE=y' \
            'CONFIG_FUNCTION_TRACER=y' \
            'CONFIG_TRACING=y' \
            'CONFIG_FUNCTION_ERROR_INJECTION=y' \
            'CONFIG_BPF_KPROBE_OVERRIDE=y' \
            'CONFIG_BPF_EVENTS=y' \
            >> $CONFIG

      # 5. Build kernel using build.sh (Android 12.1 standard)
      - name: Build kernel
        run: |
          cd android-kernel
          LTO=thin BUILD_CONFIG=common/build.config.rpi build/build.sh -j$(nproc)

      # 6. Copy files from 'dist'
      - name: Copy boot files
        run: |
          cd android-kernel
          mkdir -p android-boot-package
          DIST_DIR=$(find out -name "dist" -type d | head -n 1)
          
          if [ -n "$DIST_DIR" ]; then
            cp $DIST_DIR/Image android-boot-package/ 2>/dev/null || true
            cp $DIST_DIR/*.dtb android-boot-package/ 2>/dev/null || true
            cp $DIST_DIR/ramdisk.img android-boot-package/ 2>/dev/null || true
            [ -d "$DIST_DIR/overlays" ] && cp -r $DIST_DIR/overlays android-boot-package/
          else
            exit 1
          fi

      # 7. Upload boot package
      - name: Upload boot package
        uses: actions/upload-artifact@v4
        with:
          name: android-12.1-rpi4-kernel
          path: android-kernel/android-boot-package/*
