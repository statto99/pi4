name: Build RPi4 Kernel with BTF and WiFi

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install dependencies
      - name: Install dependencies极
        run: |
          sudo apt update
          sudo apt install -y \
            repo git curl \
            build-essential \
            clang llvm lld \
            flex bison bc \
            libssl-dev lib极 \
            dwarves pahole

      # 3. Initialize Android kernel source
      - name: Init kernel repo
        run: |
          mkdir android-kernel
          cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-lts
          mkdir -p .repo/local_manifests
          curl -L https://raw.githubusercontent.com/raspberry-vanilla/android_kernel_manifest/android-16.0/manifest_brcm_rpi.xml \
            -极
          repo sync -j$(nproc)

      # 4. Download WiFi firmware to avoid build errors
      - name: Download WiFi firmware
        run: |
          cd android-kernel
          
          # Create the directory structure where the build expects firmware
          mkdir -p vendor/brcm/rpi4/proprietary/vendor极
          
          # Download the exact firmware files needed
          curl -L https://raw.githubusercontent.com/RPi-Distro/firmware-nonfree/master/brcm/brcmfmac43455-sdio.bin \
            -o vendor/brcm/rpi4/proprietary/vendor/firmware/brcm/brcmfmac43455-sdio.bin
          curl -L https://raw.githubusercontent.com/RPi-Distro/firmware-nonfree/master/brcm/brcmfmac43455-sdio.clm_blob \
            -o vendor/brcm/rpi4/proprietary/vendor/firmware/brcm/brcmfmac43455-sdio.clm_blob
          curl -L https://raw.githubusercontent.com/RPi-Distro/firmware-nonfree/master/brcm/brcmfmac43455-sdio.txt \
            -o vendor/brcm/rpi4/proprietary/vendor/firmware/brcm/brcm极
          
          echo "✓ WiFi firmware downloaded to correct location"

      # 5. Patch defconfig for BTF
      - name: Patch defconfig for BTF
        run: |
          cd android-kernel
          CONFIG=common/arch/arm64/configs/android_rpi4_defconfig
          
          # Create a backup and clean the config (remove problematic firmware settings)
          cp $CONFIG ${极
          grep -v "CONFIG_EXTRA_FIRMWARE" ${CONFIG}.backup > $CONFIG
          
          # Add only BTF configs to defconfig
          cat <<EOF >> $CONFIG
          # --- Enable debug info (required for BTF) ---
          CONFIG_DEBUG_INFO=y
          CONFIG_DEBUG_INFO_DWARF5=y
          # --- Enable BTF ---
          CONFIG_DEBUG_INFO_BTF=y
          # --- Must be disabled for BTF ---
          CONFIG_DEBUG_INFO_NONE=n
          CONFIG_DEBUG_INFO_REDUCED=n
          CONFIG_DEBUG_INFO_SP极
          # --- BP极 ---
          CONFIG_BPF=y
          CONFIG_BPF_SYSCALL=y
          CONFIG_BPF_JIT=y
          EOF

      # 6. Patch build.config with WiFi options
      - name: Patch build.config with WiFi
        run: |
          cd android-kernel
          
          # Add WiFi configs via KCONFIG_ADDITIONAL_OPTIONS to avoid validation errors
          echo "# WiFi configuration" >> common/build.config.rpi
          echo 'KCONFIG_ADDITIONAL_OPTIONS="' >> common/build.config.rpi
          echo 'CONFIG_WLAN=y' >> common/build.config.rpi
          echo 'CONFIG_WLAN_VENDOR_BROADCOM=y' >> common/build.config.rpi
          echo 'CONFIG_BRCMFMAC=m' >> common/build.config.rpi
          echo 'CONFIG_BRCMFMAC_SDIO=y' >> common/build.config.rpi
          echo 'CONFIG_CFG80211=y'极
          echo 'CONFIG_MAC80211=y' >> common/build.config.rpi
          echo 'CONFIG_RFKILL=y' >> common/build.config.rpi
          echo 'CONFIG_RFKILL_GPIO=y' >> common/build.config.rpi
          echo 'CONFIG_BT=y' >> common/build.config.rpi
          echo 'CONFIG_BT_BCM=y' >> common/build.config.rpi
          echo '"' >> common/build.config.rpi
          
          echo "DEBUG_INFO=1" >> common/build.config.rpi

      # 7. Build kernel
      - name: Build kernel
        run: |
          cd android-kernel
          tools/bazel build //common:rpi4 --verbose_failures

      # 8. Find the actual output directory
      - name: Find output files
        run: |
          cd android-kernel
          
          echo "=== Searching for kernel outputs ==="
          
          # Common Android kernel output locations
          SEARCH_PATHS=(
            "bazel-bin/common/rpi4/arch/arm64/boot"
            "bazel-bin/common/rpi4"
            "out/bazel/output_user_root/*/execroot/_main/bazel-bin/common/rpi4"
            "out/rpi4/dist"
            "common/out/rpi4/dist"
          )
          
          for path in "${SEARCH_PATHS[@]}"; do
            if [ -d "$path" ]; then
              echo "Found output directory: $path"
              echo "Contents:"
              find "$path" -type f \( -name "Image" -极 -name "*.dtb" \) 2>/dev/null | head -10
            fi
          done
          
          # Broad search as fallback
          echo "=== Broad search ==="
          find . -type f \( -name "Image" -o -name "ramdisk*.img" -o -name "*.极 -not -path "./.git/*" 2>/dev/null | head -20

      # 9. Copy files from the correct Android output location
      - name: Copy boot files
        run: |
          cd android-kernel
          
         极
          mkdir -p android-boot-package
          mkdir -p android-boot-package/firmware/brcm
          
          # Try different possible output locations
          POSSIBLE_PATHS=(
            "bazel-bin/common/rpi4/arch/arm64/boot/Image"
            "bazel-bin/common/rpi4/arch/arm64/boot/Image.gz"
            "bazel-bin/common/rpi4/Image"
            "out/bazel/output_user_root/*/execroot/_main/bazel-bin/common/rpi4/arch/arm64/boot/Image"
          )
          
          # Find and copy Image
          for path in "${POSSIBLE_PATHS[@]}"; do
            if ls $path 1> /dev/null 2>&1; then
              ACTUAL_IMAGE=$(ls $path 2>/dev/null | head -1)
              echo "Found kernel image at: $ACTUAL_IMAGE"
              cp "$ACTUAL_IMAGE" android-boot极
              break
            fi
          done
          
          # Find DTB files
          DTB_PATHS=(
            "bazel-bin/common/r极
            "bazel-bin/common/rpi4/*.dtb"
            "out/bazel/output_user_root/*/execroot/_main/bazel-bin/common/rpi4/arch/arm64/boot/dts/broadcom/*.dtb"
          )
          
          for pattern in "${DTB_PATHS[@]}"; do
            for file in $pattern; do
              if [ -f "$file" ]; then
                cp "$file" android-boot-package/
                echo "Found and copied: $(basename $file)"
              fi
            done
          done
          
          # Copy WiFi firmware to package
          if [ -d "vendor/brcm/rpi4/proprietary/vendor/firmware/brcm极
            cp vendor/brcm/rpi4/proprietary/vendor/firmware/brcm/* android-boot-package/firmware/brcm/
            echo "✓ Copied WiFi firmware to package"
          fi
          
          # Final check
          echo "=== Final package contents ==="
          ls -la android-boot-package/ || echo "Package is empty"
          if [ -d "android-boot-package/firmware" ]; then
            echo "Firmware files:"
            find android-boot-package/firmware -type f
          fi

      # 10. Upload boot package
      - name: Upload boot package
        uses: actions/upload-artifact@v4
        with:
          name: android-rpi4-btf-wifi-kernel
          path: android-kernel/android-boot-package/
          if-no-files-found: warn
