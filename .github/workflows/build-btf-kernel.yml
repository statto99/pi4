name: Build RPi4 Kernel (Android 13) - Discovery Mode

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y repo git curl build-essential clang llvm lld flex bison bc libssl-dev libelf-dev dwarves pahole

      - name: Init kernel repo
        run: |
          mkdir android-kernel
          cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android13-5.15
          mkdir -p .repo/local_manifests
          curl -fL https://raw.githubusercontent.com/raspberry-vanilla/android_kernel_manifest/android-13.0/manifest_brcm_rpi4.xml -o .repo/local_manifests/rpi.xml
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle

      - name: Patch RPi4 Fragment
        run: |
          cd android-kernel
          CONFIG_PATH="common/build.config.rpi4.defconfig"
          [ ! -f "$CONFIG_PATH" ] && exit 1
          printf 'CONFIG_DEBUG_INFO=y\nCONFIG_DEBUG_INFO_BTF=y\nCONFIG_BPF=y\nCONFIG_BPF_SYSCALL=y\n' >> "$CONFIG_PATH"

      - name: Discover and Build Target
        run: |
          cd android-kernel
          echo "=== DISCOVERING TARGETS ==="
          # This query finds everything that looks like an rpi4 build target
          tools/bazel query "//...:all" | grep rpi4 || true
          
          echo "=== ATTEMPTING BUILD ==="
          # Based on Android 13 patterns, it is likely one of these:
          # //common:rpi4_pcie or //common:kernel_rpi4
          # We will try the most likely candidate from the RPi manifest
          tools/bazel build //common:rpi4_pcie --jobs=2 --local_ram_resources=3072 || \
          tools/bazel build //common:kernel_rpi4 --jobs=2 --local_ram_resources=3072

      - name: Locate and Package Artifacts
        if: always()
        run: |
          cd android-kernel
          mkdir -p android-boot-package
          find bazel-bin/ -type f -name "Image" -exec cp {} android-boot-package/Image \;
          find bazel-bin/ -type f -name "*.dtb" -exec cp {} android-boot-package/ \;
          ls -R android-boot-package/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpi4-debug-build
          path: android-kernel/android-boot-package/
