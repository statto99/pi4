name: Build RPi4 Kernel (Android 13) with BTF

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            repo git curl \
            build-essential \
            clang llvm lld \
            flex bison bc \
            libssl-dev libelf-dev \
            dwarves pahole

      - name: Init kernel repo
        run: |
          mkdir android-kernel
          cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android13-5.15
          mkdir -p .repo/local_manifests
          # Verified URL
          curl -fL https://raw.githubusercontent.com/raspberry-vanilla/android_kernel_manifest/android-13.0/manifest_brcm_rpi4.xml \
            -o .repo/local_manifests/rpi.xml
          # Syncing specifically to ensure the RPi overlay lands
          repo sync -c -j$(nproc) --force-sync

      - name: Patch RPi4 Fragment for BTF + uprobes
        run: |
          cd android-kernel
          # TARGET FILE FOUND IN YOUR LOG:
          CONFIG_PATH="common/build.config.rpi4.defconfig"
          
          if [ ! -f "$CONFIG_PATH" ]; then
            echo "!! ERROR: $CONFIG_PATH still missing !!"
            exit 1
          fi
          
          echo "Patching $CONFIG_PATH..."
          cp "$CONFIG_PATH" "${CONFIG_PATH}.backup"
          
          # Clean out existing BPF/BTF/Tracing to avoid conflicts
          grep -v -E "CONFIG_DEBUG_INFO[^_]|CONFIG_DEBUG_INFO_DWARF5|CONFIG_DEBUG_INFO_BTF|CONFIG_BPF[^_]|CONFIG_BPF_SYSCALL|CONFIG_BPF_JIT|CONFIG_KPROBES[^_]|CONFIG_KPROBE_EVENTS|CONFIG_UPROBES|CONFIG_UPROBE_EVENTS|CONFIG_PERF_EVENTS|CONFIG_FTRACE[^_]|CONFIG_DYNAMIC_FTRACE|CONFIG_FUNCTION_TRACER|CONFIG_TRACING|CONFIG_BPF_EVENTS" \
            "${CONFIG_PATH}.backup" > "$CONFIG_PATH"
            
          # Add the required BTF and Tracing options
          printf '%s\n' \
            'CONFIG_DEBUG_INFO=y' \
            'CONFIG_DEBUG_INFO_DWARF5=y' \
            'CONFIG_DEBUG_INFO_BTF=y' \
            'CONFIG_BPF=y' \
            'CONFIG_BPF_SYSCALL=y' \
            'CONFIG_BPF_JIT=y' \
            'CONFIG_KPROBES=y' \
            'CONFIG_KPROBE_EVENTS=y' \
            'CONFIG_UPROBES=y' \
            'CONFIG_UPROBE_EVENTS=y' \
            'CONFIG_PERF_EVENTS=y' \
            'CONFIG_FTRACE=y' \
            'CONFIG_DYNAMIC_FTRACE=y' \
            'CONFIG_FUNCTION_TRACER=y' \
            'CONFIG_TRACING=y' \
            'CONFIG_BPF_EVENTS=y' \
            >> "$CONFIG_PATH"
          
          echo "=== Patch Applied ==="
          tail -n 20 "$CONFIG_PATH"

      - name: Build and Distribute Kernel
        run: |
          cd android-kernel
          # Use the _dist target which is standard for Kleaf (Android 13+)
          # Added RAM limit to prevent the runner from crashing
          tools/bazel run //common:rpi4_dist -- --dist_dir=out/dist --local_ram_resources=HOST_RAM*.6

      - name: Prepare Artifacts
        run: |
          cd android-kernel
          mkdir -p android-boot-package
          if [ -d "out/dist" ]; then
            cp out/dist/Image android-boot-package/ 2>/dev/null || true
            cp out/dist/*.dtb android-boot-package/ 2>/dev/null || true
            cp out/dist/ramdisk.img android-boot-package/ 2>/dev/null || true
            [ -d "out/dist/overlays" ] && cp -r out/dist/overlays android-boot-package/
          fi
          ls -la android-boot-package/

      - name: Upload Boot Package
        uses: actions/upload-artifact@v4
        with:
          name: android13-rpi4-kernel-btf
          path: android-kernel/android-boot-package/
          if-no-files-found: error
