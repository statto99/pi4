name: Build RPi4 Kernel with BTF (with WiFi)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            repo git curl \
            build-essential \
            clang llvm lld \
            flex bison bc \
            libssl-dev libelf-dev \
            dwarves pahole

      # 3. Initialize Android kernel source
      - name: Init kernel repo
        run: |
          mkdir android-kernel
          cd android-kernel

          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-lts

          mkdir -p .repo/local_manifests
          curl -L https://raw.githubusercontent.com/raspberry-vanilla/android_kernel_manifest/android-16.0/manifest_brcm_rpi.xml \
            -o .repo/local_manifests/rpi.xml

          repo sync -j$(nproc)

      # 4. Patch defconfig for BTF AND WiFi
      - name: Patch defconfig for BTF and WiFi
        run: |
          cd android-kernel

          CONFIG=common/arch/arm64/configs/android_rpi4_defconfig
          
          # Create a backup and clean the config
          cp $CONFIG ${CONFIG}.backup
          grep -v "CONFIG_EXTRA_FIRMWARE" ${CONFIG}.backup > $CONFIG
          
          cat <<EOF >> $CONFIG

          # --- Enable debug info (required for BTF) ---
          CONFIG_DEBUG_INFO=y
          CONFIG_DEBUG_INFO_DWARF5=y

          # --- Enable BTF ---
          CONFIG_DEBUG_INFO_BTF=y

          # --- Must be disabled for BTF ---
          CONFIG_DEBUG_INFO_NONE=n
          CONFIG_DEBUG_INFO_REDUCED=n
          CONFIG_DEBUG_INFO_SPLIT=n

          # --- BPF core ---
          CONFIG_BPF=y
          CONFIG_BPF_SYSCALL=y
          CONFIG_BPF_JIT=y

          # --- WiFi drivers for RPi4 ---
          CONFIG_WLAN=y
          CONFIG_WLAN_VENDOR_BROADCOM=y
          CONFIG_BRCMFMAC=m
          CONFIG_BRCMFMAC_SDIO=y
          CONFIG_BRCMFMAC_PROTO_BCDC=y
          CONFIG_BRCMFMAC_PROTO_MSGBUF=y
          CONFIG_BRCM_TRACING=y
          CONFIG_BRCMDBG=y
          CONFIG_CFG80211=y
          CONFIG_MAC80211=y
          CONFIG_MAC80211_RC_MINSTREL=y
          CONFIG_MAC80211_RC_MINSTREL_HT=y
          CONFIG_MAC80211_RC_MINSTREL_VHT=y
          CONFIG_MAC80211_MESH=y
          CONFIG_RFKILL=y
          CONFIG_RFKILL_GPIO=y

          # --- Bluetooth (often on same chip) ---
          CONFIG_BT=y
          CONFIG_BT_BREDR=y
          CONFIG_BT_LE=y
          CONFIG_BT_BCM=y
          CONFIG_BT_HCIUART=y
          CONFIG_BT_HCIUART_BCM=y

          # --- Firmware loading ---
          CONFIG_FW_LOADER=y
          CONFIG_FW_LOADER_USER_HELPER=y
          CONFIG_FW_LOADER_USER_HELPER_FALLBACK=y
          CONFIG_EXTRA_FIRMWARE="brcm/brcmfmac43455-sdio.bin brcm/brcmfmac43455-sdio.clm_blob brcm/brcmfmac43455-sdio.txt"
          CONFIG_EXTRA_FIRMWARE_DIR="/lib/firmware"

          EOF

      # 5. Download WiFi firmware for RPi4
      - name: Download WiFi firmware
        run: |
          cd android-kernel
          
          # Create firmware directory structure
          mkdir -p firmware/brcm
          
          # Download RPi4 WiFi firmware
          curl -L https://raw.githubusercontent.com/RPi-Distro/firmware-nonfree/master/brcm/brcmfmac43455-sdio.bin \
            -o firmware/brcm/brcmfmac43455-sdio.bin
          curl -L https://raw.githubusercontent.com/RPi-Distro/firmware-nonfree/master/brcm/brcmfmac43455-sdio.clm_blob \
            -o firmware/brcm/brcmfmac43455-sdio.clm_blob
          curl -L https://raw.githubusercontent.com/RPi-Distro/firmware-nonfree/master/brcm/brcmfmac43455-sdio.txt \
            -o firmware/brcm/brcmfmac43455-sdio.txt
          
          echo "WiFi firmware downloaded"

      # 6. Patch build.config to include modules
      - name: Patch build.config
        run: |
          cd android-kernel
          echo "DEBUG_INFO=1" >> common/build.config.rpi || true
          echo "MODULES=1" >> common/build.config.rpi || true
          echo "EXT_MODULES=\"brcmfmac\"" >> common/build.config.rpi || true

      # 7. Build kernel
      - name: Build kernel
        run: |
          cd android-kernel
          tools/bazel build //common:rpi4 --verbose_failures

      # 8. Find and copy boot files
      - name: Copy boot files
        run: |
          cd android-kernel
          
          # Create package directory
          mkdir -p android-boot-package
          
          # Find kernel image
          KERNEL_IMAGE=$(find bazel-bin -name "Image" -type f 2>/dev/null | head -1)
          if [ -n "$KERNEL_IMAGE" ]; then
            cp "$KERNEL_IMAGE" android-boot-package/Image
            echo "✓ Copied Image"
          fi
          
          # Find DTB files
          DTB_FILES=$(find bazel-bin -name "*.dtb" -type f 2>/dev/null)
          for dtb in $DTB_FILES; do
            cp "$dtb" android-boot-package/
            echo "✓ Copied $(basename $dtb)"
          done
          
          # Look for modules
          MODULES_DIR=$(find bazel-bin -type d -name "modules" 2>/dev/null | head -1)
          if [ -n "$MODULES_DIR" ]; then
            mkdir -p android-boot-package/modules
            find "$MODULES_DIR" -name "*.ko" -type f | head -20 | while read module; do
              cp "$module" android-boot-package/modules/
              echo "✓ Copied module: $(basename $module)"
            done
          fi
          
          # Copy firmware
          if [ -d "firmware" ]; then
            mkdir -p android-boot-package/firmware
            cp -r firmware/* android-boot-package/firmware/
            echo "✓ Copied firmware"
          fi
          
          # Show package contents
          echo "=== Package contents ==="
          find android-boot-package -type f | sort

      # 9. Upload boot package
      - name: Upload boot package
        uses: actions/upload-artifact@v4
        with:
          name: android-rpi4-boot-files-with-wifi
          path: android-kernel/android-boot-package/
