name: Build RPi4 Kernel with BTF and WiFi

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            repo git curl \
            build-essential \
            clang llvm lld \
            flex bison bc \
            libssl-dev libelf-dev \
            dwarves pahole

      # 3. Initialize Android kernel source
      - name: Init kernel repo
        run: |
          mkdir android-kernel
          cd android-kernel

          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12-lts

          mkdir -p .repo/local_manifests
          curl -L https://raw.githubusercontent.com/raspberry-vanilla/android_kernel_manifest/android-16.0/manifest_brcm_rpi.xml \
            -o .repo/local_manifests/rpi.xml

          repo sync -j$(nproc)

      # 4. Download missing WiFi firmware for RPi4
      - name: Download WiFi firmware
        run: |
          cd android-kernel
          
          # Create firmware directory structure
          mkdir -p vendor/brcm/rpi4/proprietary/vendor/firmware/brcm
          
          # Download RPi4 specific WiFi firmware
          curl -L https://raw.githubusercontent.com/RPi-Distro/firmware-nonfree/master/brcm/brcmfmac43455-sdio.bin \
            -o vendor/brcm/rpi4/proprietary/vendor/firmware/brcm/brcmfmac43455-sdio.bin
          curl -L https://raw.githubusercontent.com/RPi-Distro/firmware-nonfree/master/brcm/brcmfmac43455-sdio.clm_blob \
            -o vendor/brcm/rpi4/proprietary/vendor/firmware/brcm/brcmfmac43455-sdio.clm_blob
          curl -L https://raw.githubusercontent.com/RPi-Distro/firmware-nonfree/master/brcm/brcmfmac43455-sdio.txt \
            -o vendor/brcm/rpi4/proprietary/vendor/firmware/brcm/brcmfmac43455-sdio.txt
          
          echo "✓ WiFi firmware downloaded"

      # 5. Patch defconfig for BTF and WiFi
      - name: Patch defconfig
        run: |
          cd android-kernel

          CONFIG=common/arch/arm64/configs/android_rpi4_defconfig
          
          # Create a backup
          cp $CONFIG ${CONFIG}.backup
          
          # Remove existing firmware config to avoid conflicts
          grep -v "CONFIG_EXTRA_FIRMWARE" ${CONFIG}.backup > $CONFIG
          grep -v "CONFIG_EXTRA_FIRMWARE_DIR" $CONFIG > temp_config && mv temp_config $CONFIG
          
          # Add BTF and WiFi configuration
          cat <<EOF >> $CONFIG

          # --- Enable debug info (required for BTF) ---
          CONFIG_DEBUG_INFO=y
          CONFIG_DEBUG_INFO_DWARF5=y

          # --- Enable BTF ---
          CONFIG_DEBUG_INFO_BTF=y

          # --- Must be disabled for BTF ---
          CONFIG_DEBUG_INFO_NONE=n
          CONFIG_DEBUG_INFO_REDUCED=n
          CONFIG_DEBUG_INFO_SPLIT=n

          # --- BPF core ---
          CONFIG_BPF=y
          CONFIG_BPF_SYSCALL=y
          CONFIG_BPF_JIT=y

          # --- WiFi drivers for RPi4 ---
          CONFIG_WLAN=y
          CONFIG_WLAN_VENDOR_BROADCOM=y
          CONFIG_BRCMFMAC=m
          CONFIG_BRCMFMAC_SDIO=y
          CONFIG_BRCMFMAC_PROTO_BCDC=y
          CONFIG_BRCMFMAC_PROTO_MSGBUF=y
          CONFIG_CFG80211=y
          CONFIG_MAC80211=y
          CONFIG_RFKILL=y
          CONFIG_RFKILL_GPIO=y

          # --- Bluetooth (same chip) ---
          CONFIG_BT=y
          CONFIG_BT_BCM=y
          CONFIG_BT_HCIUART=y

          # --- Firmware loading ---
          CONFIG_EXTRA_FIRMWARE="brcm/brcmfmac43455-sdio.bin brcm/brcmfmac43455-sdio.clm_blob"
          CONFIG_EXTRA_FIRMWARE_DIR="/vendor/brcm/rpi4/proprietary/vendor/firmware"

          EOF

      # 6. Ensure Android build system keeps debug info
      - name: Patch build.config
        run: |
          cd android-kernel
          echo "DEBUG_INFO=1" >> common/build.config.rpi || true

      # 7. Build kernel
      - name: Build kernel
        run: |
          cd android-kernel
          tools/bazel build //common:rpi4

      # 8. Copy boot files and firmware
      - name: Copy boot files and firmware
        run: |
          cd android-kernel
          
          # Create package directory
          mkdir -p android-boot-package
          mkdir -p android-boot-package/firmware/brcm
          
          # Find and copy kernel image
          KERNEL_IMAGE=$(find bazel-bin -name "Image" -type f 2>/dev/null | head -1)
          if [ -n "$KERNEL_IMAGE" ]; then
            cp "$KERNEL_IMAGE" android-boot-package/Image
            echo "✓ Copied Image"
          fi
          
          # Find and copy DTB files
          DTB_FILES=$(find bazel-bin -name "*.dtb" -type f 2>/dev/null)
          for dtb in $DTB_FILES; do
            cp "$dtb" android-boot-package/
            echo "✓ Copied $(basename $dtb)"
          done
          
          # Copy WiFi firmware
          if [ -d "vendor/brcm/rpi4/proprietary/vendor/firmware/brcm" ]; then
            cp vendor/brcm/rpi4/proprietary/vendor/firmware/brcm/* android-boot-package/firmware/brcm/
            echo "✓ Copied WiFi firmware"
          fi
          
          # Show package contents
          echo "=== Package contents ==="
          find android-boot-package -type f | sort

      # 9. Upload boot package
      - name: Upload boot package
        uses: actions/upload-artifact@v4
        with:
          name: android-rpi4-btf-wifi-kernel
          path: android-kernel/android-boot-package/
