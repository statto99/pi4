name: Build RPi4 Kernel (Android 13) with BTF

on:
  workflow_dispatch:

env:
  # This stops deprecation warnings from slowing down the runner
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            repo git curl \
            build-essential \
            clang llvm lld \
            flex bison bc \
            libssl-dev libelf-dev \
            dwarves pahole

      # 3. The "Overlay" Strategy (Base + Local Manifest)
      - name: Init kernel repo
        run: |
          mkdir android-kernel
          cd android-kernel
          # 1. Initialize with the official Google Android 13 Manifest
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android13-5.15
          
          # 2. Add the Raspberry Pi overlay to the correct folder
          mkdir -p .repo/local_manifests
          curl -fL https://raw.githubusercontent.com/raspberry-vanilla/android_kernel_manifest/android-13.0/manifest_brcm_rpi4.xml \
            -o .repo/local_manifests/rpi.xml
            
          # 3. Sync with --force-sync. This is MANDATORY because the RPi manifest 
          # needs to "delete" the Google kernel folder and swap in its own.
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle

      # 4. Patching (Finding the RPi source)
      - name: Patch defconfig for BTF + uprobes
        run: |
          cd android-kernel
          # Searching everywhere for the RPi4 config
          CONFIG_PATH=$(find . -name "android_rpi4_defconfig" | head -n 1)
          
          if [ -z "$CONFIG_PATH" ]; then
            echo "!! ERROR: android_rpi4_defconfig not found after sync !!"
            echo "Searching for any defconfig to help debug:"
            find . -name "*defconfig" | head -n 10
            exit 1
          fi
          
          echo "Found config at: $CONFIG_PATH"
          cp "$CONFIG_PATH" "${CONFIG_PATH}.backup"
          
          grep -v -E "CONFIG_DEBUG_INFO[^_]|CONFIG_DEBUG_INFO_DWARF5|CONFIG_DEBUG_INFO_BTF|CONFIG_DEBUG_INFO_NONE|CONFIG_DEBUG_INFO_REDUCED|CONFIG_DEBUG_INFO_SPLIT|CONFIG_BPF[^_]|CONFIG_BPF_SYSCALL|CONFIG_BPF_JIT|CONFIG_KPROBES[^_]|CONFIG_KPROBE_EVENTS|CONFIG_UPROBES|CONFIG_UPROBE_EVENTS|CONFIG_PERF_EVENTS|CONFIG_FTRACE[^_]|CONFIG_DYNAMIC_FTRACE|CONFIG_FUNCTION_TRACER|CONFIG_GENERIC_TRACER|CONFIG_TRACING|CONFIG_EXTRA_FIRMWARE|CONFIG_BPF_KPROBE_OVERRIDE|CONFIG_FUNCTION_ERROR_INJECTION|CONFIG_BPF_EVENTS" \
            "${CONFIG_PATH}.backup" > "$CONFIG_PATH"
            
          printf '%s\n' \
            'CONFIG_DEBUG_INFO=y' \
            'CONFIG_DEBUG_INFO_DWARF5=y' \
            'CONFIG_DEBUG_INFO_BTF=y' \
            'CONFIG_BPF=y' \
            'CONFIG_BPF_SYSCALL=y' \
            'CONFIG_BPF_JIT=y' \
            'CONFIG_KPROBES=y' \
            'CONFIG_KPROBE_EVENTS=y' \
            'CONFIG_UPROBES=y' \
            'CONFIG_UPROBE_EVENTS=y' \
            'CONFIG_PERF_EVENTS=y' \
            'CONFIG_FTRACE=y' \
            'CONFIG_DYNAMIC_FTRACE=y' \
            'CONFIG_FUNCTION_TRACER=y' \
            'CONFIG_TRACING=y' \
            'CONFIG_FUNCTION_ERROR_INJECTION=y' \
            'CONFIG_BPF_KPROBE_OVERRIDE=y' \
            'CONFIG_BPF_EVENTS=y' \
            >> "$CONFIG_PATH"

      - name: Build kernel
        run: |
          cd android-kernel
          # We use your original build target
          tools/bazel build //common:rpi4 --verbose_failures

      - name: Locate and Package Artifacts
        run: |
          cd android-kernel
          mkdir -p android-boot-package
          # Deep search for build artifacts to avoid symlink issues
          find bazel-bin/ -type f -name "Image" -exec cp {} android-boot-package/Image \;
          find bazel-bin/ -type f -name "*.dtb" -exec cp {} android-boot-package/ \;
          find bazel-bin/ -type f -name "ramdisk*.img" -exec cp {} android-boot-package/ \;
          ls -la android-boot-package/

      - name: Upload Boot Package
        uses: actions/upload-artifact@v4
        with:
          name: android13-rpi4-kernel-btf
          path: android-kernel/android-boot-package/
          if-no-files-found: warn
